name: "✨ Feature Request"
description: "Suggest a new feature or enhancement for Clawbot."
title: "[Feature]: "
labels:
  - "enhancement"
body:
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear description of the problem. e.g. *I'm always frustrated when…*"
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear description of what you want to happen."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Any alternative solutions or features you've considered."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Feature area"
      options:
        - Accessibility
        - AI / Machine Learning
        - Blockchain / Decentralization
        - Crisis Response
        - Documentation
        - Gamification / Contribution Pipeline
        - Multilingual Support
        - Quantum Computing
        - Security
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Before submitting"
      options:
        - label: "I have read [CONTRIBUTING.md](../../blob/main/CONTRIBUTING.md)"
          required: true
        - label: "I have searched existing issues and PRs to avoid duplicates"
          required: true
