name: Accessibility Testing (WCAG)

on:
  push:
    branches: ['main', 'master']
    paths:
      - '**.html'
      - '**.htm'
      - '**.css'
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
  pull_request:
    paths:
      - '**.html'
      - '**.htm'
      - '**.css'
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test for accessibility (overrides file-based scan)'
        required: false
        default: ''
      wcag_level:
        description: 'WCAG conformance level to enforce (wcag2a, wcag2aa, wcag2aaa, wcag21aa)'
        required: false
        default: 'wcag2aa'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  axe-scan:
    name: axe-core WCAG Accessibility Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install axe-core CLI and dependencies
        run: |
          npm install -g @axe-core/cli
          npm install -g http-server

      - name: Install Chromium (for headless scan)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: Discover HTML files
        id: find_html
        run: |
          FILES=$(find . -type f \( -iname '*.html' -o -iname '*.htm' \) \
            ! -path './node_modules/*' ! -path './.git/*' | head -30 || true)
            # Note: limited to 30 files per run to keep CI duration reasonable.
            # Increase the head -30 limit for repositories with many HTML pages.
          if [ -z "$FILES" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan HTML files with axe-core
        if: steps.find_html.outputs.found == 'true' && !github.event.inputs.url
        env:
          WCAG_LEVEL: ${{ github.event.inputs.wcag_level || 'wcag2aa' }}
        run: |
          mkdir -p accessibility-reports
          HAS_VIOLATIONS=0
          while IFS= read -r html_file; do
            [ -z "$html_file" ] && continue
            BASENAME=$(basename "$html_file" .html)
            echo "Scanning: $html_file"
            # Start a local server for the file
            DIR=$(dirname "$html_file")
            PORT=$((8080 + RANDOM % 1000))
            http-server "$DIR" -p "$PORT" --silent &
            SERVER_PID=$!
            sleep 1
            FILENAME=$(basename "$html_file")
            axe "http://localhost:${PORT}/${FILENAME}" \
              --tags "$WCAG_LEVEL" \
              --reporter json \
              --save "accessibility-reports/${BASENAME}-axe-report.json" || HAS_VIOLATIONS=1
            kill "$SERVER_PID" 2>/dev/null || true
          done <<< "${{ steps.find_html.outputs.files }}"
          exit $HAS_VIOLATIONS

      - name: Scan URL with axe-core
        if: github.event.inputs.url != ''
        env:
          SCAN_URL: ${{ github.event.inputs.url }}
          WCAG_LEVEL: ${{ github.event.inputs.wcag_level || 'wcag2aa' }}
        run: |
          mkdir -p accessibility-reports
          axe "$SCAN_URL" \
            --tags "$WCAG_LEVEL" \
            --reporter json \
            --save "accessibility-reports/url-axe-report.json"

      - name: Parse and summarise results
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, sys

          report_dir = pathlib.Path("accessibility-reports")
          if not report_dir.exists():
              print("No accessibility reports found.")
              sys.exit(0)

          total_violations = 0
          total_passes = 0
          for report_file in sorted(report_dir.glob("*.json")):
              try:
                  data = json.loads(report_file.read_text())
              except Exception as e:
                  print(f"Could not parse {report_file}: {e}")
                  continue
              for result in data if isinstance(data, list) else [data]:
                  violations = result.get("violations", [])
                  passes = result.get("passes", [])
                  total_violations += len(violations)
                  total_passes += len(passes)
                  if violations:
                      print(f"\n=== {report_file.name} — {len(violations)} violation(s) ===")
                      for v in violations:
                          print(f"  [{v.get('impact','?').upper()}] {v.get('id')}: {v.get('description')}")
                          for node in v.get("nodes", [])[:3]:
                              print(f"    └ {node.get('html','')[:120]}")

          print(f"\nSummary: {total_violations} violation(s), {total_passes} pass(es)")
          if total_violations > 0:
              sys.exit(1)
          PYEOF

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-reports
          path: accessibility-reports/
          if-no-files-found: ignore

      - name: Comment on PR with accessibility summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportDir = 'accessibility-reports';
            let body = '## ♿ Accessibility Scan Results\n\n';
            if (!fs.existsSync(reportDir)) {
              body += '_No HTML files found to scan._\n';
            } else {
              const files = fs.readdirSync(reportDir).filter(f => f.endsWith('.json'));
              if (files.length === 0) {
                body += '_No reports generated._\n';
              } else {
                let totalViolations = 0;
                for (const file of files) {
                  const data = JSON.parse(fs.readFileSync(path.join(reportDir, file), 'utf8'));
                  const results = Array.isArray(data) ? data : [data];
                  for (const r of results) {
                    const violations = r.violations || [];
                    totalViolations += violations.length;
                    body += `### ${file}\n`;
                    if (violations.length === 0) {
                      body += '✅ No violations found.\n\n';
                    } else {
                      body += `❌ ${violations.length} violation(s):\n`;
                      for (const v of violations) {
                        body += `- **[${(v.impact||'').toUpperCase()}]** \`${v.id}\`: ${v.description}\n`;
                      }
                      body += '\n';
                    }
                  }
                }
                body += `\n**Total violations: ${totalViolations}**\n`;
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
