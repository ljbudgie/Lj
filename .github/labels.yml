labels:
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed — great for community contributors"
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers to the project"
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  - name: "accessibility"
    color: "0075ca"
    description: "Related to accessibility features or WCAG compliance"
  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: "ai-collaboration"
    color: "e4e669"
    description: "Related to AI or machine-learning integrations"
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  - name: "duplicate"
    color: "cfd3d7"
    description: "This issue or pull request already exists"
  - name: "wontfix"
    color: "ffffff"
    description: "This will not be worked on"
