# Clawbot Central Configuration
# All feature settings are controlled here.

accessibility:
  ai_adaptations:
    enabled: true
    # Supported profiles: visual_impairment, motor_impairment, cognitive, default
    profiles:
      visual_impairment:
        font_size: large
        high_contrast: true
        haptic_feedback: true
      motor_impairment:
        keyboard_only: true
        extended_timeouts: true
      cognitive:
        simplified_language: true
        reading_level: grade_8
      default:
        font_size: medium
        high_contrast: false

  multilingual:
    enabled: true
    source_language: en
    target_languages:
      - es
      - fr
      - de
      - zh
      - ar
      - pt
      - ja
    docs_path: docs/
    translation_output: docs/translations/

  braille:
    enabled: true
    format: brf        # Braille-ready format (BRF)
    grade: 2           # Grade 2 Braille (contracted)
    output_path: docs/braille/

ai_collaboration:
  hugging_face:
    enabled: true
    model: "bert-base-multilingual-cased"
    endpoint_env: HUGGINGFACE_API_TOKEN
  deepl:
    enabled: true
    endpoint_env: DEEPL_API_KEY
  reinforcement_learning:
    enabled: false     # Opt-in; requires custom model registry
    model_registry: ""

  intelligent_decision_making:
    enabled: true
    suggestion_threshold: 0.75   # Confidence threshold (0–1)
    actions:
      - stale_issue_comment
      - dependency_bump
      - documentation_gap

automation:
  dependency_updates:
    enabled: true
    schedule: "0 6 * * 1"   # Every Monday at 06:00 UTC
    automerge: patch         # Auto-merge: patch | minor | none
    labels:
      - dependencies
      - automated
  workflow_updates:
    enabled: true

contribution_pipeline:
  gamification:
    enabled: true
    badges:
      accessibility_champion:
        label: "♿ Accessibility Champion"
        criteria: "PR improves accessibility and passes all a11y checks"
      multilingual_hero:
        label: "🌐 Multilingual Hero"
        criteria: "PR adds or improves translations"
      dependency_guardian:
        label: "🛡️ Dependency Guardian"
        criteria: "PR updates dependencies"
      first_contribution:
        label: "🌱 First Contribution"
        criteria: "First merged PR by contributor"

  pr_review:
    enabled: true
    checks:
      - code_style
      - accessibility_compliance
      - issue_linking
    auto_comment: true

  contributor_assistant:
    enabled: true
    tag_suggestions: true
    link_related_issues: true

ecosystem:
  self_healing:
    enabled: true
    monitor_schedule: "0 */6 * * *"   # Every 6 hours
    notify_on_failure: true
    auto_retry: true
    max_retries: 3

  reputation:
    enabled: true
    scoring:
      merged_pr: 10
      accessibility_pr: 25
      translation_pr: 20
      issue_resolved: 5
      review_given: 3
    leaderboard_size: 10
